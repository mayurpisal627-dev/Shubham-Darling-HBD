<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Database Test</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Sign Up Form</h2>
    <form id="userForm">
        <input type="text" id="username" placeholder="Enter Your Name" required>
        <input type="email" id="email" placeholder="Enter Your Email" required>
        <button type="submit">Submit to Cloud</button>
    </form>
    <div id="message"></div>
</div>

<script>
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const messageDiv = document.getElementById('message');
        
        messageDiv.style.color = "blue";
        messageDiv.innerText = "Saving to server...";

        try {
            // यहाँ तुम्हारा रेंडर का असली लाइव लिंक जुड़ा हुआ है
            const response = await fetch('https://onrender.com', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, email })
            });

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Success! Data saved to Render Cloud 🎉";
                document.getElementById('userForm').reset();
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerText = "Server Error: Could not save data.";
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Network Error: Server is waking up, try again in 30 seconds.";
            console.error(error);
        }
    });
</script>

</body>
</html>
