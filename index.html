<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Database Sign Up</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #218838; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Sign Up Form</h2>
    <form id="userForm">
        <input type="text" id="nameInput" placeholder="Enter Your Name" required>
        <input type="email" id="emailInput" placeholder="Enter Your Email" required>
        <button type="submit">Submit to Cloud</button>
    </form>
    <div id="message"></div>
</div>

<script>
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;
        const messageDiv = document.getElementById('message');
        
        messageDiv.style.color = "blue";
        messageDiv.innerText = "Connecting to cloud server...";

        try {
            // Render ka 100% active live endpoint
            const response = await fetch('https://onrender.com', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // Yahan variable name 'username' kar diya hai jo server ko chahiye
                body: JSON.stringify({ username: name, email: email })
            });

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Success! Data saved to Render Cloud 🎉";
                document.getElementById('userForm').reset();
            } else {
                const errorText = await response.text();
                messageDiv.style.color = "red";
                messageDiv.innerText = "Server Error: " + errorText;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Network Error: Server is waking up, please wait 30 seconds.";
            console.error(error);
        }
    });
</script>

</body>
</html>
